name: CI Pipeline

on:
  push:
    branches:
      - '**'        # runs on every branch push
  pull_request:
    branches:
      - main
      - develop

jobs:
  # Job 1 — Lint and Test Backend
  test-backend:
    name: Lint and Test Backend
    runs-on: ubuntu-latest

      # Spin up a postgres container for tests
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: conduit
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: conduit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run Prisma migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://conduit:testpassword@localhost:5432/conduit_test
        run: npx prisma migrate deploy

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://conduit:testpassword@localhost:5432/conduit_test
        run: npm test --if-present

  # Job 2 — Lint and Test Frontend
  test-frontend:
    name: Lint and Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test --if-present -- --watchAll=false

  # Job 3 — Build and Validate Docker Images
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]  # only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false       # CI only builds, does not push
          tags: conduit-backend:ci
          cache-from: type=gbc,scope=backend
          cache-to: type=gbc,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false       # CI only builds, does not push
          tags: conduit-frontend:ci
          cache-from: type=gbc,scope=frontend
          cache-to: type=gbc,mode=max,scope=frontend
